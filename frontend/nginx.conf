server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location = /benchmark {
        try_files /index.html =404;
    }

    location = /.well-known/appspecific/com.chrome.devtools.json {
        access_log off;
        log_not_found off;
        return 204;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
