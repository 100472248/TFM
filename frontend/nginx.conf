server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location = /benchmark {
        try_files /index.html =404;
    }

    location ^~ /benchmark/style/ {
        rewrite ^/benchmark/style/(.*)$ /style/$1 break;
        try_files $uri =404;
    }

    location ^~ /benchmark/js/ {
        rewrite ^/benchmark/js/(.*)$ /js/$1 break;
        try_files $uri =404;
    }

    location ^~ /benchmark/images/ {
        rewrite ^/benchmark/images/(.*)$ /images/$1 break;
        try_files $uri =404;
    }

    location ^~ /benchmark/ {
        rewrite ^/benchmark/(.*)$ /$1 break;
        try_files $uri $uri/ /index.html;
    }

    location = /.well-known/appspecific/com.chrome.devtools.json {
        access_log off;
        log_not_found off;
        return 204;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
