server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location = /benchmark {
        try_files /index.html =404;
    }

    location ^~ /benchmark/api/ {
        rewrite ^/benchmark/api/(.*)$ /api/$1 break;
        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /benchmark/solicitar {
        proxy_pass http://backend:5000/solicitar;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /benchmark/procesar {
        proxy_pass http://backend:5000/procesar;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /benchmark/style/ {
        rewrite ^/benchmark/style/(.*)$ /style/$1 break;
        try_files $uri =404;
    }

    location ^~ /benchmark/js/ {
        rewrite ^/benchmark/js/(.*)$ /js/$1 break;
        try_files $uri =404;
    }

    location ^~ /benchmark/images/ {
        rewrite ^/benchmark/images/(.*)$ /images/$1 break;
        try_files $uri =404;
    }

    location ^~ /benchmark/fonts/ {
        rewrite ^/benchmark/fonts/(.*)$ /fonts/$1 break;
        try_files $uri =404;
    }

    location ^~ /benchmark/ {
        rewrite ^/benchmark/(.*)$ /$1 break;
        try_files $uri $uri/ /index.html;
    }

    location = /.well-known/appspecific/com.chrome.devtools.json {
        access_log off;
        log_not_found off;
        return 204;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
