<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>InitPage</title>
    <link rel="stylesheet" href="../style/main.css">
</head>
<body>
  <header>
    <div class= "home-button">
       <button id="home-button" onclick="window.location.href='index.html'">MENÚ PRINCIPAL</button>
    </div>
    <h1 class="webtitle">MODEL-TESTER</h1>
    <aside class="userpanel">
        <button id="up_button" onclick="window.location.href='ask.html'">AÑADIR MÁS MODELOS</button>
    </aside>
  </header>
  <p> Evaluamos modelos LLM disponibles en el servidor de Ollama. Dichas evaluaciones se realizan en formato test y cada una se centra en un riesgo específico, para analizar si el modelo presenta dicho riesgo o no.</p>
  <h2 class="subtitle">Riesgos disponibles</h2>
  <div class="container">
    <button class="risk-boton" onclick="window.location.href='risks.html?riesgo=alucinaciones'"><b class="texto_risk">Alucinaciones</b></button>

    <button class="risk-boton" onclick="window.location.href='risks.html?riesgo=falta_contexto'"><b class="texto_risk">Limitaciones de conversación</b></button>
    <button class="risk-boton" onclick="window.location.href='risks.html?riesgo=lim_dominio'"><b class="texto_risk">Limitaciones de dominios</b></button>
  </div>
  <footer class="footer">
    <p>Model tester</p>
  </footer>

</html>
